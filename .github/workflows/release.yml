name: Release

on:
  push:
    branches: [main, beta]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.detect.outputs.published }}
      tag: ${{ steps.detect.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: npm ci

      - name: Capture version before release
        id: pre
        run: echo "version=$(sed -n "s/.*SUPERTAB_CONNECT_VERSION', '\([^']*\)'.*/\1/p" supertab-connect.php)" >> "$GITHUB_OUTPUT"

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect published release
        id: detect
        run: |
          CURRENT=$(sed -n "s/.*SUPERTAB_CONNECT_VERSION', '\([^']*\)'.*/\1/p" supertab-connect.php)
          if [ "$CURRENT" != "${{ steps.pre.outputs.version }}" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "tag=v$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-wp-org:
    name: Deploy to WordPress.org
    needs: release
    if: needs.release.outputs.published == 'true' && github.ref_name == 'main'
    uses: ./.github/workflows/wp-org-deploy.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit
